services:
  - type: web
    name: sanmitra-backend-staging-sg
    runtime: python
    plan: starter
    region: singapore
    branch: main
    rootDir: .
    buildCommand: pip install --prefer-binary --upgrade-strategy only-if-needed -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGODB_URI
        sync: false
      - key: MONGO_DB_NAME
        sync: false
      - key: POSTGRES_URI
        sync: false
      - key: PG_CONNECT_TIMEOUT_SECONDS
        value: "5"
      - key: PG_POOL_SIZE
        value: "8"
      - key: PG_MAX_OVERFLOW
        value: "0"
      - key: PG_POOL_TIMEOUT_SECONDS
        value: "5"
      - key: PG_POOL_RECYCLE_SECONDS
        value: "300"
      - key: PG_AUTO_CREATE_TABLES
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: OTP_PEPPER
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DEFAULT_APP_KEY
        value: legalmitra
      - key: ALLOWED_APP_KEYS
        value: mandirmitra,gruhamitra,mitrabooks,legalmitra,investmitra
      - key: GOOGLE_OAUTH_CLIENT_IDS
        sync: false
      - key: AUTH_PUBLIC_BASE_URL
        sync: false
      - key: AUTH_EMAIL_DEBUG_RETURN_LINK
        value: "false"
      - key: MOBILE_OTP_DEBUG_RETURN_CODE
        value: "false"
      - key: MANDIR_ONBOARDING_SECRET
        sync: false
      - key: SUPER_ADMIN_BOOTSTRAP
        value: "false"
      - key: DEMO_MANDIR_BOOTSTRAP
        value: "false"
      - key: RAG_EMBEDDING_PROVIDER
        value: hash
      - key: LEGAL_HYBRID_AI_FALLBACK_ENABLED
        value: "true"
      - key: LEGAL_RAG_ENABLED
        value: "false"
      - key: RAG_AUTO_SYNC_ENABLED
        value: "true"
      - key: LEGAL_SYNC_WORKER_ENABLED
        value: "true"
      - key: LEGAL_SYNC_WORKER_POLL_SECONDS
        value: "60"
      - key: LEGAL_SYNC_WORKER_BATCH_SIZE
        value: "5"

