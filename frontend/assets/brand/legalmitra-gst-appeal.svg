<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">GST appeal limitation article image</title>
  <desc id="desc">An adjudication order, GST portal notice, calendar deadline, and appeal file showing the risk of missing Section 107 limitation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.58" stop-color="#15345c"/>
      <stop offset="1" stop-color="#6f3b14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <circle cx="1020" cy="112" r="170" fill="#d6b25e" opacity="0.11"/>
  <circle cx="180" cy="620" r="220" fill="#2563eb" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="90" y="92" width="430" height="560" rx="26" fill="#f8fafc"/>
    <rect x="132" y="132" width="156" height="18" rx="9" fill="#0f172a"/>
    <rect x="132" y="178" width="302" height="14" rx="7" fill="#94a3b8"/>
    <rect x="132" y="214" width="270" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="132" y="250" width="318" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="132" y="292" width="330" height="118" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="160" y="342" fill="#1e3a8a" font-family="Arial, sans-serif" font-size="34" font-weight="800">Section 107</text>
    <text x="160" y="378" fill="#1e40af" font-family="Arial, sans-serif" font-size="22" font-weight="700">Appeal limitation clock starts here</text>
    <rect x="132" y="454" width="152" height="56" rx="12" fill="#d6b25e"/>
    <text x="160" y="490" fill="#111827" font-family="Arial, sans-serif" font-size="24" font-weight="900">ORDER</text>
    <rect x="308" y="454" width="154" height="56" rx="12" fill="#fee2e2"/>
    <text x="334" y="490" fill="#991b1b" font-family="Arial, sans-serif" font-size="24" font-weight="900">DEMAND</text>
    <text x="132" y="582" fill="#475569" font-family="Arial, sans-serif" font-size="24" font-weight="700">GST Adjudication Order</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="610" y="116" width="420" height="302" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="656" y="176" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="900">Limitation Tracker</text>
    <rect x="656" y="224" width="104" height="92" rx="18" fill="#2563eb"/>
    <text x="682" y="266" fill="#fff" font-family="Arial, sans-serif" font-size="24" font-weight="800">3</text>
    <text x="675" y="294" fill="#fff" font-family="Arial, sans-serif" font-size="20" font-weight="700">months</text>
    <rect x="794" y="224" width="104" height="92" rx="18" fill="#b91c1c"/>
    <text x="822" y="266" fill="#fff" font-family="Arial, sans-serif" font-size="24" font-weight="800">30</text>
    <text x="817" y="294" fill="#fff" font-family="Arial, sans-serif" font-size="20" font-weight="700">days</text>
    <path d="M662 358h284" stroke="#d6b25e" stroke-width="8" stroke-linecap="round"/>
    <circle cx="662" cy="358" r="13" fill="#22c55e"/>
    <circle cx="806" cy="358" r="13" fill="#eab308"/>
    <circle cx="946" cy="358" r="13" fill="#ef4444"/>
    <text x="650" y="397" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="20">Communication date to filing deadline</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="595" y="470" width="470" height="124" rx="22" fill="#f8fafc"/>
    <text x="630" y="516" fill="#111827" font-family="Arial, sans-serif" font-size="30" font-weight="900">Will the appeal be heard?</text>
    <text x="630" y="554" fill="#475569" font-family="Arial, sans-serif" font-size="24">The first fight may be limitation, not merits.</text>
  </g>
</svg>
