<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">BNSS transition filing article image</title>
  <desc id="desc">A court filing desk showing CrPC to BNSS statute mapping, petition review, and current criminal law filing checks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#080d19"/>
      <stop offset="0.55" stop-color="#172554"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <path d="M0 572c178-72 350-52 516 10 196 73 386 82 684-34v202H0z" fill="#0f172a" opacity="0.72"/>

  <g filter="url(#shadow)">
    <rect x="88" y="116" width="342" height="456" rx="26" fill="#182235" stroke="#475569" stroke-width="2"/>
    <text x="136" y="178" fill="#f8fafc" font-family="Arial, sans-serif" font-size="38" font-weight="900">Old Draft</text>
    <rect x="136" y="226" width="196" height="58" rx="12" fill="#334155"/>
    <text x="184" y="264" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="28" font-weight="900">CrPC</text>
    <rect x="136" y="326" width="226" height="14" rx="7" fill="#94a3b8"/>
    <rect x="136" y="366" width="260" height="14" rx="7" fill="#64748b"/>
    <rect x="136" y="406" width="208" height="14" rx="7" fill="#64748b"/>
    <rect x="136" y="474" width="224" height="50" rx="11" fill="#111827"/>
    <text x="166" y="507" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="22" font-weight="800">Legacy section?</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="116" width="342" height="456" rx="26" fill="#f8fafc"/>
    <text x="818" y="178" fill="#111827" font-family="Arial, sans-serif" font-size="38" font-weight="900">Court Filing</text>
    <rect x="818" y="226" width="196" height="58" rx="12" fill="#1e40af"/>
    <text x="862" y="264" fill="#fff" font-family="Arial, sans-serif" font-size="28" font-weight="900">BNSS</text>
    <rect x="818" y="326" width="226" height="14" rx="7" fill="#94a3b8"/>
    <rect x="818" y="366" width="260" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="818" y="406" width="208" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="818" y="474" width="224" height="50" rx="11" fill="#d6b25e"/>
    <text x="846" y="507" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="900">Verified provision</text>
  </g>

  <path d="M492 342h176" stroke="#d6b25e" stroke-width="18" stroke-linecap="round"/>
  <path d="M646 292l72 50-72 50" fill="none" stroke="#d6b25e" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="378" y="562" width="444" height="84" rx="18" fill="#111827" stroke="#475569"/>
    <text x="424" y="597" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="900">Transition review before filing</text>
    <text x="424" y="628" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="20">statute mapping | stage check | relief wording</text>
  </g>
</svg>
