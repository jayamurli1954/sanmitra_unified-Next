<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">LLP annual compliance article image</title>
  <desc id="desc">An MCA filing dashboard with Form 11, Form 8, partner records, DSC status, and annual compliance evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#082f2b"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#3f2d12"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <circle cx="1050" cy="150" r="190" fill="#d6b25e" opacity="0.12"/>
  <circle cx="210" cy="635" r="210" fill="#14b8a6" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="88" y="112" width="430" height="520" rx="28" fill="#f8fafc"/>
    <text x="134" y="174" fill="#111827" font-family="Arial, sans-serif" font-size="42" font-weight="900">LLP Annual File</text>
    <rect x="134" y="230" width="160" height="70" rx="14" fill="#d6b25e"/>
    <text x="168" y="274" fill="#111827" font-family="Arial, sans-serif" font-size="26" font-weight="900">Form 11</text>
    <rect x="322" y="230" width="142" height="70" rx="14" fill="#0f766e"/>
    <text x="362" y="274" fill="#fff" font-family="Arial, sans-serif" font-size="26" font-weight="900">Form 8</text>
    <rect x="134" y="348" width="286" height="14" rx="7" fill="#94a3b8"/>
    <rect x="134" y="388" width="250" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="134" y="428" width="306" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="134" y="506" width="318" height="54" rx="13" fill="#e6fffb" stroke="#0f766e" stroke-width="2"/>
    <text x="160" y="541" fill="#115e59" font-family="Arial, sans-serif" font-size="24" font-weight="900">Partner records reconciled?</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="610" y="112" width="420" height="520" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="656" y="174" fill="#f8fafc" font-family="Arial, sans-serif" font-size="38" font-weight="900">MCA Readiness</text>
    <g fill="none" stroke="#22c55e" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
      <path d="M668 246l28 28 58-70"/>
      <path d="M668 336l28 28 58-70"/>
      <path d="M668 426l28 28 58-70"/>
      <path d="M668 516l28 28 58-70"/>
    </g>
    <rect x="800" y="222" width="150" height="18" rx="9" fill="#d6b25e"/>
    <rect x="800" y="258" width="198" height="12" rx="6" fill="#64748b"/>
    <rect x="800" y="312" width="190" height="18" rx="9" fill="#d6b25e"/>
    <rect x="800" y="348" width="150" height="12" rx="6" fill="#64748b"/>
    <rect x="800" y="402" width="128" height="18" rx="9" fill="#d6b25e"/>
    <rect x="800" y="438" width="182" height="12" rx="6" fill="#64748b"/>
    <rect x="800" y="492" width="164" height="18" rx="9" fill="#d6b25e"/>
    <rect x="800" y="528" width="206" height="12" rx="6" fill="#64748b"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="354" y="604" width="492" height="76" rx="18" fill="#f8fafc"/>
    <text x="394" y="636" fill="#111827" font-family="Arial, sans-serif" font-size="24" font-weight="900">The form is only the final step.</text>
    <text x="394" y="664" fill="#475569" font-family="Arial, sans-serif" font-size="20">Books, DSC, SRN, challan, and acknowledgement matter.</text>
  </g>
</svg>
