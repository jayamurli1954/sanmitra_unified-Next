<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f3d2b">
    <title>MandirMitra Public Payment</title>
    <link rel="icon" href="../assets/brand/mandirmitra-logo.jpeg" type="image/jpeg">
    <link rel="stylesheet" href="../shared/app-shell.css?v=mandir-public-v4">
  </head>
  <body>
    <main class="main public-main">
      <section class="content">
        <section class="legacy-strip mandir-theme">
          <div>
            <strong>MandirMitra Public Payment</strong>
            <span class="muted">No-login temple selection and public UPI configuration visibility.</span>
          </div>
          <img class="legacy-media" src="../assets/brand/mandirmitra-logo.jpeg" alt="MandirMitra">
          <span class="pill ok">public</span>
        </section>

        <section class="card">
          <div class="toolbar">
            <div class="field">
              <label for="api-base">Backend API base URL</label>
              <input id="api-base" placeholder="http://127.0.0.1:8000">
            </div>
            <button id="load-temples" type="button">Load Public Temples</button>
          </div>
        </section>

        <section class="grid">
          <article class="card span-4">
            <h3>Temple</h3>
            <div class="field">
              <label for="temple-select">Select temple/trust</label>
              <select id="temple-select">
                <option value="">Load public temples first</option>
              </select>
            </div>
            <div id="temple-info" class="module-state">No temple selected.</div>
          </article>

          <article class="card span-8">
            <h3>Payment Visibility</h3>
            <div class="entry-form-grid">
              <div class="entry-form">
                <label class="field">
                  <span>Payment type</span>
                  <select id="payment-type">
                    <option value="donation">Donation</option>
                    <option value="seva">Seva</option>
                  </select>
                </label>
                <label class="field">
                  <span>Purpose</span>
                  <select id="purpose-select">
                    <option value="">Select temple first</option>
                  </select>
                </label>
                <label class="field">
                  <span>Amount</span>
                  <input id="amount" type="number" min="1" step="0.01" value="101">
                </label>
                <label class="field">
                  <span>Devotee name</span>
                  <input id="devotee-name" value="Demo Devotee">
                </label>
                <label class="field">
                  <span>Mobile</span>
                  <input id="devotee-phone" inputmode="tel" value="9000000001">
                </label>
                <button id="preview-upi" type="button">Preview UPI Instructions</button>
                <button id="submit-payment" type="button">Submit Demo Payment</button>
              </div>
            </div>
            <div id="payment-preview" class="module-state">Select a temple and preview payment instructions.</div>
          </article>
        </section>

        <section class="card">
          <h3>Last Public API Response</h3>
          <pre id="api-output">No request yet.</pre>
        </section>
      </section>
    </main>
    <script type="module" src="./app.js?v=mandir-public-v4"></script>
  </body>
</html>
