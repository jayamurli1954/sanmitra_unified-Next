[pytest]
testpaths = tests
norecursedirs =
    external-repos
    .venv
    .pgdata
    data
    logs
    tmp
python_files = test_*.py
addopts = -q -k "not receipt_pdf"
markers =
    legacy_reference: copied reference-backend tests that still target removed package paths
    needs_frontend_manifest: requires docs/frontend_route_manifest.json generated from external frontends
    receipt_pdf: requires validated native PDF rendering dependencies
