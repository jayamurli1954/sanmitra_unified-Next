name: accounting-stability-gate

on:
  push:
    branches:
      - main
    paths:
      - app/modules/mandir_compat/**
      - app/modules/housing_compat/**
      - app/accounting/**
      - tests/test_mandir_*.py
      - tests/test_accounting_*.py
      - scripts/check_repository_safety.py
      - scripts/check_text_integrity.py
      - .github/workflows/accounting-stability-gate.yml
  pull_request:
    paths:
      - app/modules/mandir_compat/**
      - app/modules/housing_compat/**
      - app/accounting/**
      - tests/test_mandir_*.py
      - tests/test_accounting_*.py
      - scripts/check_repository_safety.py
      - scripts/check_text_integrity.py
      - .github/workflows/accounting-stability-gate.yml
  workflow_dispatch:

jobs:
  accounting-stability:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements-dev.txt

      - name: Repository Safety Guardrails
        run: |
          python scripts/check_repository_safety.py

      - name: Compile Python Sources
        run: |
          python -m compileall app scripts tests

      - name: Check Text Integrity
        run: |
          python scripts/check_text_integrity.py app scripts .github/workflows

      - name: Accounting Regression Suite
        run: |
          python -m pytest \
            tests/test_accounting_account_update.py \
            tests/test_accounting_app_key_isolation.py \
            tests/test_accounting_context_isolation.py \
            tests/test_accounting_immutability.py \
            tests/test_accounting_report_drilldown.py \
            tests/test_accounting_report_verification.py \
            tests/test_accounting_reversal.py \
            tests/test_accounting_validation.py \
            tests/test_mandir_accounting_setup_stability.py \
            tests/test_mandir_coa_edit_persistence.py \
            tests/test_mandir_posting_guardrails.py \
            tests/test_mandir_report_routes.py \
            tests/test_mandir_reports.py \
            -k "not receipt_pdf"
