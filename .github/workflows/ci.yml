name: backend-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements-dev.txt

      - name: Repository Safety Guardrails
        run: |
          python scripts/check_repository_safety.py

      - name: Compile Python Sources
        run: |
          python -m compileall app scripts tests

      - name: Check Text Integrity
        run: |
          python scripts/check_text_integrity.py app scripts .github/workflows

      - name: Frontend Backend Route Contract
        run: |
          python scripts/check_frontend_backend_route_contract.py --fail-on-missing

      - name: Run Tests
        run: |
          python -m pytest \
            tests/test_health.py \
            tests/test_module_registry.py \
            tests/test_modules_me_endpoint.py \
            tests/test_tenants_lifecycle.py \
            tests/test_module_access_dependency.py \
            tests/test_users_me_context.py \
            tests/test_accounting_validation.py \
            tests/test_accounting_context_isolation.py \
            tests/test_accounting_app_key_isolation.py \
            tests/test_mandir_reports.py \
            tests/test_mandir_posting_guardrails.py \
            -k "not receipt_pdf"

      - name: CI Summary
        if: always()
        run: |
          {
            echo "## Backend CI"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo "- Python: 3.11"
            echo "- Checks: repository safety, compileall, text integrity, route contract, supported pytest suite"
          } >> "$GITHUB_STEP_SUMMARY"
