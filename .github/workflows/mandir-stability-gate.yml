name: mandir-stability-gate

on:
  push:
    branches:
      - main
    paths:
      - app/modules/mandir_compat/**
      - app/accounting/**
      - tests/test_mandir_*.py
      - tests/test_accounting_validation.py
      - scripts/check_repository_safety.py
      - scripts/check_text_integrity.py
      - .github/workflows/mandir-stability-gate.yml
  pull_request:
    paths:
      - app/modules/mandir_compat/**
      - app/accounting/**
      - tests/test_mandir_*.py
      - tests/test_accounting_validation.py
      - scripts/check_repository_safety.py
      - scripts/check_text_integrity.py
      - .github/workflows/mandir-stability-gate.yml
  workflow_dispatch:

jobs:
  mandir-stability:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements-dev.txt

      - name: Repository Safety Guardrails
        run: |
          python scripts/check_repository_safety.py

      - name: Compile Python Sources
        run: |
          python -m compileall app scripts tests

      - name: Check Text Integrity
        run: |
          python scripts/check_text_integrity.py app scripts .github/workflows

      - name: Mandir Regression Suite
        run: |
          python -m pytest \
            tests/test_mandir_accounting_setup_stability.py \
            tests/test_mandir_coa_edit_persistence.py \
            tests/test_mandir_devotees_and_pincode.py \
            tests/test_mandir_donation_cleanup.py \
            tests/test_mandir_legacy_coa_import.py \
            tests/test_mandir_onboarding_auth_flow.py \
            tests/test_mandir_opening_balance_import.py \
            tests/test_mandir_posting_guardrails.py \
            tests/test_mandir_report_routes.py \
            tests/test_mandir_reports.py \
            tests/test_mandir_seva_import.py \
            tests/test_mandir_temple_read_side_effects.py \
            tests/test_accounting_validation.py \
            -k "not receipt_pdf"
